<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практична робота 5: Асинхронне програмування та API</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Практична робота No5: Асинхронне програмування та робота з API</h1>
    <button id="loadPokemon">Load Pokémon Data</button>
    <pre id="pokemonOutput">
        <div id="pokemonCard">
            <h2 id="pokeName" style="text-transform: capitalize;"></h2>
            <img id="pokeImg" src="" alt="Pokemon Image" style="width: 150px;">
            <p><strong>ID:</strong> <span id="pokeId"></span></p>
            <p><strong>Type:</strong> <span id="pokeType"></span></p>
            <p><strong>Weight:</strong> <span id="pokeWeight"></span> kg</p>
        </div>
    </pre>
    <script src="script.js"></script>
</body>

</html>
